<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turismo ARG</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/header.css">
    <link rel="stylesheet" href="assets/css/footer.css">
</head>
<body>
    <div id="header"></div>
    <main>
        <section class="hero">
            <video autoplay muted loop id="hero-video">
                <source src="/pysw_tp1/assets/video/Argentina.mp4" type="video/mp4">
                Tu navegador no soporta videos.
            </video>
            <div class="hero-overlay">
                <h1 class="animate-text">Descubre la magia de Argentina</h1>
                <p>Aventuras inolvidables</p>
            </div>
        </section>

        <section class="destinos container">
            <h2>Destacados</h2>
            <div class="grid-destinos">
                <article class="card">
                    <img src="/pysw_tp1/assets/img/PUNMAMARCA.webp" alt="Purmamarca">
                    <div class="card-info">
                        <h3>Purmamarca</h3>
                        <p>Cerro de los Siete Colores</p>
                    </div>
                </article>
                <article class="card">
                    <img src="/pysw_tp1/assets/img/USHUAIA.webp" alt="Ushuaia">
                    <div class="card-info">
                        <h3>Ushuaia</h3>
                        <p>Parque Nacional Tierra del Fuego</p>
                    </div>
                </article>
                <article class="card">
                    <img src="/pysw_tp1/assets/img/necochea.jpg" alt="necochea">
                    <div class="card-info">
                        <h3>Necochea</h3>
                        <p>Ubicada en el Río Quequén Grande</p>
                    </div>
                </article>
                <article class="card">
                    <img src="/pysw_tp1/assets/img/SALINAS.jpg" alt="Salinas Grandes">
                    <div class="card-info">
                        <h3>Salinas Grandes</h3>
                        <p>Un mar de sal a 4000 metros</p>
                    </div>
                </article>
                <article class="card">
                    <img src="/pysw_tp1/assets/img/TILCARA.jpg" alt="Tilcara">
                    <div class="card-info">
                        <h3>Tilcara</h3>
                        <p>Historia y cultura andina</p>
                    </div>
                </article>
            </div>
        </section>

        <section class="contador">
            <div class="counter-item">
                <span class="number" data-target="199">150</span>
                <p>Visitas</p>
            </div>
        </section>

        <section class="testimonios">
            <div class="carrusel-css">
                <input type="radio" name="slider" id="item-1" checked>
                <input type="radio" name="slider" id="item-2">
                <input type="radio" name="slider" id="item-3">
                <input type="radio" name="slider" id="item-4">
                <input type="radio" name="slider" id="item-5">
                <input type="radio" name="slider" id="item-6">
                
                <div class="cards-carrusel">
                    <label class="card-testimonio" for="item-1" id="test-1">
                        <p>"Increíble experiencia en el norte."</p><span>- Juan Pérez</span>
                    </label>
                    <label class="card-testimonio" for="item-2" id="test-2">
                        <p>"La mejor atención que recibí."</p><span>- María Garcia</span>
                    </label>
                    <label class="card-testimonio" for="item-3" id="test-3">
                        <p>"Ushuaia es de otro planeta."</p><span>- Carlos Ruiz</span>
                    </label>
                    <label class="card-testimonio" for="item-4" id="test-4">
                        <p>"Las Salinas son mágicas."</p><span>- Ana López</span>
                    </label>
                    <label class="card-testimonio" for="item-5" id="test-5">
                        <p>"Tilcara tiene mucha cultura."</p><span>- Pedro Gómez</span>
                    </label>
                    <label class="card-testimonio" for="item-6" id="test-6">
                        <p>"Necochea y sus playas, único."</p><span>- Lucía Paz</span>
                    </label>
                </div>
            </div>
        </section>
    </main>
    <div id="footer"></div>
    <script src="assets/js/include.js"></script>
</body>
</html>
