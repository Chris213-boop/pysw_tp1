<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turismo Jujuy</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/header.css">
    <link rel="stylesheet" href="assets/css/footer.css">
</head>

<body>
    <div id="header"></div>

<main>

    <section class="hero">
        <video autoplay muted loop>
            <source src="assets/img/video.mp4" type="video/mp4">
        </video>
        <div class="overlay">
            <h2 class="fade">Explorá sin límites</h2>
        </div>
    </section>

    <section class="destinos">
        <h2>Destinos destacados</h2>
        <div class="cards">
            <article class="card">
                <img src="assets/img/d1.jpg">
                <div class="card-info">Playa</div>
            </article>
            <article class="card">
                <img src="assets/img/d2.jpg">
                <div class="card-info">Montaña</div>
            </article>
        </div>
    </section>

    <section class="contador">
        <h2 class="count">0</h2>
        <p>Viajeros felices</p>
    </section>

    <section class="testimonios">
        <div class="carrusel">
            <div class="slide">"Increíble experiencia"</div>
            <div class="slide">"Volvería mil veces"</div>
            <div class="slide">"Todo perfecto"</div>
        </div>
    </section>

</main>

<div id="footer"></div>

<script src="assets/js/include.js"></script>
</body>

</html>
